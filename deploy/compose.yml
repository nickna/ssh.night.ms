# Production deployment stack for ssh.night.ms.
#
# One Go BBS app container + Postgres + Redis on a private network. TLS is
# terminated at Cloudflare (proxy ON, SSL/TLS mode "Flexible") — Cloudflare ↔
# this VPS rides plain HTTP on port 80, then HTTPS browser ↔ Cloudflare.
#
# Image is built by .github/workflows/deploy.yml (or `docker build -t
# ghcr.io/nickna/ssh.night.ms:latest .`). The VPS only pulls.
#
# Usage on the VPS:
#   cp deploy/.env.example deploy/.env   # then fill in secrets
#   docker compose -f deploy/compose.yml --env-file deploy/.env up -d
#
# IMPORTANT: binds host port 22 for SSH. If the VPS's own sshd is on :22,
# move it first BEFORE bringing this stack up — otherwise docker-proxy will
# fail to bind. Recommended: edit /etc/ssh/sshd_config, set Port 2200,
# restart sshd, update your firewall + your shell config to use the new port.

name: nightms

services:
  app:
    image: ghcr.io/nickna/ssh.night.ms:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NIGHTMS_DB_CONN: "postgres://bbs:${POSTGRES_PASSWORD:?set in .env}@postgres:5432/bbs?sslmode=disable"
      NIGHTMS_REDIS_CONN: "redis://redis:6379"

      BBS_SSH_PORT: "2222"
      BBS_HTTP_PORT: "5080"

      NIGHTMS_HOST_KEY_DIR: /data/host-keys
      NIGHTMS_PFP_DIR: /data/pfp
      NIGHTMS_ART_DIR: /data/art/gallery

      NIGHTMS_BOOTSTRAP_SYSOP_HANDLE: "${NIGHTMS_BOOTSTRAP_SYSOP_HANDLE:-}"
      NIGHTMS_BOOTSTRAP_SYSOP_PASSWORD: "${NIGHTMS_BOOTSTRAP_SYSOP_PASSWORD:-}"

      # Accepts either a bare host ("night.ms") or a full URL
      # ("https://night.ms") — the app parses out the host either way.
      NIGHTMS_WEB_BASE_URL: "${NIGHTMS_WEB_BASE_URL:-night.ms}"
      # Host advertised in "ssh -p 2222 you@<host>" page snippets. Set when
      # the SSH and HTTP listeners are on different names. Empty = fall back
      # to NIGHTMS_WEB_BASE_URL.
      NIGHTMS_SSH_HOST: "${NIGHTMS_SSH_HOST:-}"
      # Optional. When unset the app generates a 32-byte key on first boot
      # and persists it to /data/host-keys/cookie-secret (mode 0600), so the
      # key survives container restarts and image updates. Set this only when
      # you need to lift a specific key (e.g. coordinating across replicas).
      NIGHTMS_COOKIE_SECRET: "${NIGHTMS_COOKIE_SECRET:-}"
      # Behind Cloudflare Flexible the inbound origin connection is plain HTTP.
      NIGHTMS_WEB_SECURE_COOKIES: "0"
    volumes:
      - app-data:/data
    ports:
      # Host :22 → container :2222. Move the VPS sshd off :22 first.
      - "22:2222"
      # Host :80 → container :5080. Lock host :80 to Cloudflare IP ranges
      # in the VPS firewall so the origin can't be reached directly.
      - "80:5080"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "/nightms", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bbs
      POSTGRES_DB: bbs
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set in .env}"
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bbs -d bbs"]
      interval: 10s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  app-data:
  pg-data:
  redis-data:
