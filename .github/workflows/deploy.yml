name: deploy

# Manual trigger from the Actions tab. Builds a Docker image on a GitHub
# runner, pushes it to GHCR, then SSHes to the OVH VPS and pulls + restarts
# the compose stack.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or SHA). Defaults to the workflow run's ref."
        required: false
        default: ""

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: build + push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      sha_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Night.Ms.SshServer/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          sparse-checkout: deploy
          sparse-checkout-cone-mode: false

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          port="${SSH_PORT:-22}"
          ssh-keyscan -p "$port" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload compose.yml to VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          port="${SSH_PORT:-22}"
          ssh -i ~/.ssh/id_deploy -p "$port" -o IdentitiesOnly=yes \
            "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -i ~/.ssh/id_deploy -P "$port" -o IdentitiesOnly=yes \
            deploy/compose.yml \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/compose.yml"

      - name: Pull image + restart stack
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_TAG: ${{ needs.build.outputs.sha_tag }}
        run: |
          set -euo pipefail
          port="${SSH_PORT:-22}"
          ssh -i ~/.ssh/id_deploy -p "$port" \
            -o IdentitiesOnly=yes \
            "$SSH_USER@$SSH_HOST" \
            "set -euo pipefail; \
             cd '$DEPLOY_PATH'; \
             docker compose --env-file .env pull app; \
             docker compose --env-file .env up -d; \
             docker image prune -f"
          echo "Deployed image tag: $IMAGE_TAG"
