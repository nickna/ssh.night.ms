name: deploy

# Manual trigger from the Actions tab. Builds a Docker image on a GitHub
# runner, pushes it to GHCR, then SSHes to the OVH VPS and pulls + restarts
# the compose stack.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or SHA). Defaults to the workflow run's ref."
        required: false
        default: ""

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: build + push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      sha_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          # lfs: true pulls the ~100 MB Carbonyl bundle (bundle/*.tar.xz) that
          # the Dockerfile carbonyl-stage extracts. Without it the checkout
          # would leave the 130-byte LFS pointer in place and the Dockerfile's
          # sha256 verify would abort the build.
          lfs: true

      # Sanity-check the bundle before we hand it to docker build. This is
      # belt-and-suspenders for the lfs: true above — if LFS bandwidth is
      # exhausted, the repo's LFS storage was revoked, or someone removed the
      # lfs: true flag, the checkout silently leaves the pointer in place and
      # the failure shows up 5 minutes later as a confusing sha256 mismatch
      # deep inside the docker buildx output. Failing here surfaces it as a
      # clear error annotation in the workflow summary in <2 seconds.
      - name: Verify Carbonyl bundle is real (not an LFS pointer)
        run: |
          set -euo pipefail
          bundle=bundle/carbonyl-linux-x86_64.tar.xz
          sumfile=bundle/carbonyl-linux-x86_64.sha256
          if [ ! -f "$bundle" ]; then
            echo "::error file=$bundle::Bundle is missing from the checkout."
            exit 1
          fi
          if [ ! -f "$sumfile" ]; then
            echo "::error file=$sumfile::sha256 file is missing from the checkout."
            exit 1
          fi
          size=$(stat -c%s "$bundle")
          # Real bundle is ~107 MB. LFS pointer is ~130 bytes. Anything under
          # 1 MB is conclusively not the real thing.
          if [ "$size" -lt 1048576 ]; then
            echo "::error file=$bundle::Bundle is only $size bytes — looks like an unresolved Git LFS pointer."
            echo "Check: actions/checkout has 'lfs: true', and the repo has LFS bandwidth/storage available on github.com."
            echo "First 200 bytes of the file (an LFS pointer starts with 'version https://git-lfs.github.com/...'):"
            head -c 200 "$bundle" || true
            exit 1
          fi
          expected=$(cat "$sumfile" | tr -d '[:space:]')
          actual=$(sha256sum "$bundle" | awk '{print $1}')
          if [ "$expected" != "$actual" ]; then
            echo "::error file=$bundle::sha256 mismatch."
            echo "  expected: $expected"
            echo "  actual:   $actual"
            exit 1
          fi
          # Also confirm the file IS an xz archive by header magic — guards
          # against an exotic case where someone commits a wrong file at the
          # right size with the sumfile somehow agreeing.
          magic=$(xxd -p -l 6 "$bundle")
          if [ "$magic" != "fd377a585a00" ]; then
            echo "::error file=$bundle::Bundle header is $magic, expected fd377a585a00 (xz magic)."
            exit 1
          fi
          echo "Bundle OK: $size bytes, sha256 $actual"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          sparse-checkout: deploy
          sparse-checkout-cone-mode: false

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          port="${SSH_PORT:-22}"
          ssh-keyscan -p "$port" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload compose.yml to VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          port="${SSH_PORT:-22}"
          ssh -i ~/.ssh/id_deploy -p "$port" -o IdentitiesOnly=yes \
            "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -i ~/.ssh/id_deploy -P "$port" -o IdentitiesOnly=yes \
            deploy/compose.yml \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/compose.yml"

      - name: Pull image + restart stack
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_TAG: ${{ needs.build.outputs.sha_tag }}
        run: |
          set -euo pipefail
          port="${SSH_PORT:-22}"
          ssh -i ~/.ssh/id_deploy -p "$port" \
            -o IdentitiesOnly=yes \
            "$SSH_USER@$SSH_HOST" \
            "set -euo pipefail; \
             cd '$DEPLOY_PATH'; \
             docker compose --env-file .env pull app; \
             docker compose --env-file .env up -d; \
             docker image prune -f"
          echo "Deployed image tag: $IMAGE_TAG"
